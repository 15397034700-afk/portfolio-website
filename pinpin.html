<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinPin - Chen Ming Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pinpin-detail.css">
</head>
<body class="detail-page">
    <div id="navigation"></div>
    <div id="decorations"></div>
    
    <main>
        <div id="pinpin-hero"></div>
        <div id="pinpin-thinking"></div>
        <div id="pinpin-preview"></div>
    </main>

    <div id="footer"></div>

    <script type="module">
        import { PinpinDetailApp } from './js/app-pinpin.js';
        window.app = new PinpinDetailApp();
        window.app.init();
    </script>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var video = document.getElementById('pinpinPromoVideo');
                var overlay = document.getElementById('pinpinVideoOverlay');
                if (video && overlay) {
                    video.muted = true;
                    video.src = 'assets/pinpin-promo.mp4';
                    video.load();

                    var togglePlay = function() {
                        if (video.paused) {
                            video.play().then(function() {
                                overlay.classList.add('hidden');
                            }).catch(function() {
                                video.muted = true;
                                video.play().then(function() {
                                    overlay.classList.add('hidden');
                                }).catch(function() {});
                            });
                        } else {
                            video.pause();
                            overlay.classList.remove('hidden');
                        }
                    };

                    overlay.addEventListener('click', togglePlay);
                    video.addEventListener('click', togglePlay);
                    video.addEventListener('ended', function() {
                        overlay.classList.remove('hidden');
                    });
                }
            }, 500);
        });
    </script>
</body>
</html>
